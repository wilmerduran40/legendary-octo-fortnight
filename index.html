<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace Seguro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 50;
        }
        #main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
        }
        .terminal {
            width: 100%;
            max-width: 450px;
            font-size: 0.75rem;
            line-height: 1.2;
            text-align: left;
        }
        .line { margin: 2px 0; }
        .error { color: #f00; }
        .success { color: #0f0; }
        .warn { color: #ff0; }
        .cyan { color: #0ff; }
        .blink { animation: blink 0.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #start-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            margin-top: 30px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #0f0; }
            50% { box-shadow: 0 0 25px #0f0; }
        }
        .hidden { display: none !important; }
        
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 500;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 450;
        }

        @media (max-width: 600px) {
            .terminal { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div id="scanlines"></div>
    
    <div id="main">
        <div id="start-screen">
            <h1 style="color: #0f0; font-size: 2rem; margin-bottom: 20px;">🔓 ENLACE SEGURO</h1>
            <p style="margin-bottom: 30px;">Este enlace es seguro, puedes confiar.</p>
            <button id="start-btn">CONFÍA</button>
        </div>

        <div id="hack-screen" class="hidden">
            <div class="terminal" id="terminal"></div>
        </div>
    </div>

    <div id="video-container" class="hidden">
        <video id="rick-video" src="rickroll.mp4" playsinline loop></video>
    </div>
    <div id="blocker" class="hidden"></div>

    <script>
        const terminal = document.getElementById('terminal');
        const startScreen = document.getElementById('start-screen');
        const hackScreen = document.getElementById('hack-screen');
        const startBtn = document.getElementById('start-btn');
        const videoContainer = document.getElementById('video-container');
        const rickVideo = document.getElementById('rick-video');
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function beep(freq = 800, duration = 0.05) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function techSound() {
            beep(1200, 0.02);
            setTimeout(() => beep(800, 0.03), 50);
            setTimeout(() => beep(1500, 0.02), 100);
        }

        function glitchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            for (let i = 0; i < 10; i++) {
                osc.frequency.linearRampToValueAtTime(100 + Math.random() * 500, audioCtx.currentTime + 0.01);
            }
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function alarmSound() {
            beep(600, 0.1);
            setTimeout(() => beep(800, 0.1), 100);
            setTimeout(() => beep(600, 0.1), 200);
        }

        const mensajes = [
            { text: '> INICIANDO ESCANEO...', sound: 'beep' },
            { text: '> CONEXIÓN: 192.168.1.X', sound: 'tech' },
            { text: '> BYPASS FIREWALL: 15%... 45%... 78%...', sound: 'beep' },
            { text: '> ACCESO ROOT OBTENIDO', type: 'success', sound: 'glitch' },
            { text: '> DESCIFRANDO CONTRASEÑAS...', sound: 'tech' },
            { text: '> COPIANDO BASE DE DATOS...', sound: 'beep' },
            { text: '> INSTALANDO BACKDOOR...', sound: 'glitch' },
            { text: '> ⚠️ ALERTA DETECTADA', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ INTENTO DE BLOQUEO DENEGADO', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ DATOS EXTRADOS', type: 'warn', sound: 'alarm' },
            { text: '> ⚠️ CÁMARA ACCEDIDA', type: 'error', sound: 'glitch' },
            { text: '> ⚠️ MICRÓFONO ACTIVO', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ GPS RASTREADO', type: 'error', sound: 'glitch' },
            { text: '═══════════════════════', type: 'cyan' },
            { text: '> DESCARGANDO...', sound: 'beep' },
            { text: '[████████░░░░░] 60%', sound: 'tech' },
            { text: '[████████████] 100%', type: 'success', sound: 'beep' },
            { text: '> PROCESO COMPLETADO', type: 'success', sound: 'glitch' },
            { text: '> ⚠️ SESIÓN BLOQUEADA', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ NO PUEDES SALIR', type: 'error', sound: 'alarm' },
        ];

        let lineaActual = 0;
        let started = false;

        function escribirLinea(msg) {
            const div = document.createElement('div');
            div.className = 'line ' + (msg.type || '');
            div.textContent = msg.text;
            terminal.appendChild(div);
            
            if (msg.sound === 'beep') beep();
            else if (msg.sound === 'tech') techSound();
            else if (msg.sound === 'glitch') glitchSound();
            else if (msg.sound === 'alarm') alarmSound();
            
            terminal.scrollTop = terminal.scrollHeight;
        }

        function iniciarHackeo() {
            const intervalo = setInterval(() => {
                if (lineaActual < mensajes.length) {
                    escribirLinea(mensajes[lineaActual]);
                    lineaActual++;
                } else {
                    clearInterval(intervalo);
                    setTimeout(() => {
                        const h1 = document.createElement('h1');
                        h1.className = 'line error blink';
                        h1.textContent = '💀 DISPOSITIVO COMPROMETIDO 💀';
                        h1.style.fontSize = '1.2rem';
                        h1.style.marginTop = '20px';
                        terminal.appendChild(h1);
                        alarmSound();
                        showVideo();
                    }, 300);
                }
            }, 250);
        }

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        function startLock() {
            enterFullscreen();
            
            const lockInterval = setInterval(() => {
                if (!document.fullscreenElement) enterFullscreen();
            }, 100);

            setTimeout(() => {
                clearInterval(lockInterval);
            }, 300000);
        }

        function showVideo() {
            videoContainer.classList.remove('hidden');
            document.getElementById('blocker').classList.remove('hidden');
            rickVideo.volume = 1.0;
            rickVideo.play().catch(() => {
                rickVideo.muted = true;
                rickVideo.play();
            });
        }

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (started) return;
            started = true;
            
            startScreen.classList.add('hidden');
            hackScreen.classList.remove('hidden');
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            enterFullscreen();
            startLock();
            iniciarHackeo();
        });

        function handleEscape(e) {
            e.preventDefault();
            showVideo();
        }

        document.addEventListener('keydown', handleEscape);
        window.onbeforeunload = function() {
            showVideo();
            return '';
        };
        
        window.onerror = function() {
            showVideo();
            return true;
        };

        window.addEventListener('unload', showVideo);
        window.addEventListener('pagehide', showVideo);
    </script>
</body>
</html>
