<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Seguridad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }
        #main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        #main h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #f00;
            animation: blink 0.3s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .terminal {
            width: 100%;
            max-width: 500px;
            font-size: 0.8rem;
            line-height: 1.3;
        }
        .line { margin: 2px 0; opacity: 0; animation: fadeIn 0.2s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        .error { color: #f00; }
        .success { color: #0f0; }
        .warn { color: #ff0; }
        .cyan { color: #0ff; }
        .progress {
            width: 100%;
            height: 8px;
            background: #222;
            margin: 5px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #0f0;
            width: 0%;
            transition: width 0.3s;
        }
        #scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 50;
        }
        #start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
            background: #0f0;
            color: #000;
            border: 3px solid #0f0;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
            animation: pulse 1.5s infinite;
        }
        #start-btn:hover {
            background: #0a0;
            transform: scale(1.1);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #0f0; }
            50% { box-shadow: 0 0 30px #0f0, 0 0 50px #0f0; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="scanlines"></div>
    
    <div id="main">
        <div id="start-screen">
            <h1 style="color: #0f0; animation: none; font-size: 2rem;">🔓 ENLACE SEGURO</h1>
            <p style="margin: 20px 0; font-size: 1rem;">Este enlace es seguro, puedes confiar.</p>
            <button id="start-btn">CONFÍA</button>
        </div>
        <div id="hack-screen" class="hidden">
            <h1>⚠️ SISTEMA COMPROMETIDO ⚠️</h1>
            <div class="terminal" id="terminal"></div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const startScreen = document.getElementById('start-screen');
        const hackScreen = document.getElementById('hack-screen');
        const startBtn = document.getElementById('start-btn');
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function beep(freq = 800, duration = 0.05, type = 'square') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function techSound() {
            beep(1200, 0.02);
            setTimeout(() => beep(800, 0.03), 50);
            setTimeout(() => beep(1500, 0.02), 100);
        }

        function glitchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            for (let i = 0; i < 10; i++) {
                osc.frequency.linearRampToValueAtTime(100 + Math.random() * 500, audioCtx.currentTime + 0.01);
            }
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function alarmSound() {
            beep(600, 0.1);
            setTimeout(() => beep(800, 0.1), 100);
            setTimeout(() => beep(600, 0.1), 200);
        }

        const mensajes = [
            { text: '> INICIANDO ESCANEO DE VULNERABILIDADES...', sound: 'beep' },
            { text: '> CONEXIÓN ESTABLECIDA: 192.168.1.XXX', sound: 'tech' },
            { text: '> BYPASS DE FIREWALL: 12%... 34%... 67%...', sound: 'beep' },
            { text: '> ACCESO ROOT OBTENIDO', type: 'success', sound: 'glitch' },
            { text: '> DESCIFRANDO CONTRASEÑAS...', sound: 'tech' },
            { text: '> COPIANDO BASE DE DATOS...', sound: 'beep' },
            { text: '> INSTALANDO PUERTA TRASERA...', sound: 'glitch' },
            { text: '> ⚠️ ALERTA DE SEGURIDAD DETECTADA', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ INTENTO DE BLOQUEO DENEGADO', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ TODOS LOS ARCHIVOS EXTRADOS', type: 'warn', sound: 'alarm' },
            { text: '> ⚠️ CÁMARA ACCEDIDA', type: 'error', sound: 'glitch' },
            { text: '> ⚠️ MICRÓFONO ACTIVO', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ GPS RASTREADO', type: 'error', sound: 'glitch' },
            { text: '> ══════════════════════════════', type: 'cyan' },
            { text: '>  DESCARGANDO DATOS...', sound: 'beep' },
            { text: '> [████████████░░░░] 75%', sound: 'tech' },
            { text: '> [████████████████] 100%', type: 'success', sound: 'beep' },
            { text: '> PROCESO COMPLETADO', type: 'success', sound: 'glitch' },
            { text: '> ⚠️ SESIÓN NO PUEDE SER CERRADA', type: 'error', sound: 'alarm' },
            { text: '> ⚠️ DISPOSITIVO BLOQUEADO', type: 'error', sound: 'alarm' },
        ];

        let lineaActual = 0;
        let started = false;

        function escribirLinea(msg) {
            const div = document.createElement('div');
            div.className = 'line ' + (msg.type || '');
            div.textContent = msg.text;
            terminal.appendChild(div);
            
            if (msg.sound === 'beep') beep();
            else if (msg.sound === 'tech') techSound();
            else if (msg.sound === 'glitch') glitchSound();
            else if (msg.sound === 'alarm') alarmSound();
            
            terminal.scrollTop = terminal.scrollHeight;
        }

        function iniciarHackeo() {
            const intervalo = setInterval(() => {
                if (lineaActual < mensajes.length) {
                    escribirLinea(mensajes[lineaActual]);
                    lineaActual++;
                } else {
                    clearInterval(intervalo);
                    setTimeout(() => {
                        document.querySelector('#hack-screen h1').textContent = '💀 DISPOSITIVO COMPROMETIDO 💀';
                        document.querySelector('#hack-screen h1').style.color = '#f00';
                    }, 500);
                }
            }, 600);
        }

        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        function startLock() {
            enterFullscreen();
            setInterval(() => {
                if (!document.fullscreenElement) enterFullscreen();
            }, 200);
        }

        function startHack() {
            startScreen.classList.add('hidden');
            hackScreen.classList.remove('hidden');
            started = true;
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            enterFullscreen();
            startLock();
            iniciarHackeo();
        }

        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startHack();
        });

        function restart() {
            terminal.innerHTML = '';
            lineaActual = 0;
            document.querySelector('#hack-screen h1').textContent = '⚠️ SISTEMA COMPROMETIDO ⚠️';
            document.querySelector('#hack-screen h1').style.color = '#f00';
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            enterFullscreen();
            startLock();
            iniciarHackeo();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                e.preventDefault();
                if (started) {
                    restart();
                }
            }
        });
    </script>
</body>
</html>
